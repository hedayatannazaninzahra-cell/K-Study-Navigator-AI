<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>K-Study Navigator AI 🇰🇷</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    padding:40px;
}


.container{
    background:white;
    color:#333;
    max-width:500px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px black;
}


h1{
    color:#1e3c72;
}


input{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:1px solid gray;
}


button{

    background:#1e3c72;
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:20px;
    cursor:pointer;

}


button:hover{

background:#2a5298;

}


.result{

margin-top:20px;
font-size:20px;
font-weight:bold;

}

</style>

</head>


<body>


<div class="container">


<h1>🇰🇷 K-Study Navigator AI</h1>

<p>
Smart academic migration assistant for South Korea
</p>


<form method="POST">


<input 
name="gpa"
placeholder="Your GPA">

<br>


<input 
name="ielts"
placeholder="IELTS Score">


<br>


<input 
name="korean"
placeholder="Korean Level (0-6)">


<br>


<input 
name="projects"
placeholder="Number of Projects">


<br>


<button>
Analyze My Profile 🚀
</button>


</form>



{% if result %}

<div class="result">

Your Admission Score:
<br>

{{result}}

</div>

{% endif %}



</div>


</body>
</html>
